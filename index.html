<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cosmos Hero</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    font-family:'Inter',sans-serif;
}

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#fff;
}

/* NAVBAR */

.navbar{
    position:absolute;
    top:20px;
    left:30px;
    right:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:999;
}

.left{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo{
    width:58px;
    height:58px;
    border-radius:50%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:700;
    border:1px solid rgba(0,0,0,.05);
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.menu{
    display:flex;
    gap:25px;
    background:#fff;
    padding:18px 30px;
    border-radius:999px;
    border:1px solid rgba(0,0,0,.05);
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.menu a{
    text-decoration:none;
    color:#111;
    font-weight:500;
}

.search{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:60px;
    background:#fff;
    border-radius:999px;
    border:1px solid rgba(0,0,0,.05);
    display:flex;
    align-items:center;
    padding:0 25px;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.search input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-size:15px;
}

.right{
    display:flex;
    align-items:center;
    gap:20px;
}

.right a{
    text-decoration:none;
    color:#111;
}

.signup{
    background:#000;
    color:#fff;
    border:none;
    padding:18px 30px;
    border-radius:999px;
    cursor:pointer;
}

/* CENTRO */

.content{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:50;
}

.content span{
    font-size:13px;
    letter-spacing:3px;
    font-weight:700;
}

.content h1{
    margin-top:20px;
    font-size:110px;
    line-height:.92;
    font-weight:500;
    color:#111;
}

.buttons{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.btn-black{
    background:#000;
    color:#fff;
    border:none;
    padding:18px 35px;
    border-radius:999px;
}

.btn-white{
    background:#fff;
    border:1px solid rgba(0,0,0,.08);
    padding:18px 35px;
    border-radius:999px;
}

/* ORBITAS */

.orbit{
    position:absolute;
    left:50%;
    top:50%;
    width:0;
    height:0;
    transform-origin:center center;
}

.orbit1{
    animation:spin 120s linear infinite;
}

.orbit2{
    animation:spinReverse 180s linear infinite;
}

.orbit3{
    animation:spin 260s linear infinite;
}

.card{
    position:absolute;
    width:130px;
    height:95px;

    left:-65px;
    top:-47px;

    border-radius:20px;
    overflow:hidden;

    background:white;

    box-shadow:
    0 20px 40px rgba(0,0,0,.08),
    0 5px 10px rgba(0,0,0,.04);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{
    from{
        transform:rotate(360deg);
    }
    to{
        transform:rotate(0deg);
    }
}

@media(max-width:768px){

    .content h1{
        font-size:52px;
    }

    .menu,
    .search{
        display:none;
    }

}

</style>
</head>

<body>

<section class="hero">

<nav class="navbar">

<div class="left">

<div class="logo">✦</div>

<div class="menu">
<a href="#">Explore</a>
<a href="#">Careers</a>
</div>

</div>

<div class="search">
<input type="text" placeholder="Try 'monochromatic digital art'">
</div>

<div class="right">
<a href="#">Login</a>
<button class="signup">Sign up</button>
</div>

</nav>

<div class="orbit orbit1" id="orbit1"></div>
<div class="orbit orbit2" id="orbit2"></div>
<div class="orbit orbit3" id="orbit3"></div>

<div class="content">

<span>COSMOS</span>

<h1>
Your space<br>
for inspiration
</h1>

<div class="buttons">
<button class="btn-black">Sign up</button>
<button class="btn-white">Get the app</button>
</div>

</div>

</section>

<script>

function createOrbit(id, radius, total){

    const orbit = document.getElementById(id);

    for(let i=0;i<total;i++){

        const angle = (360 / total) * i;

        const card = document.createElement("div");

        card.classList.add("card");

        card.style.transform =
        `rotate(${angle}deg)
         translateX(${radius}px)
         rotate(-${angle}deg)`;

        card.innerHTML =
        `<img src="https://picsum.photos/400/300?random=${i+Math.random()*1000}">`;

        orbit.appendChild(card);
    }
}

createOrbit("orbit1",350,12);
createOrbit("orbit2",520,18);
createOrbit("orbit3",700,24);

</script>

</body>
</html>
